<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <section class="todo-card" data-testid="test-todo-card" role="region">

    <!-- Header(Task) starts here -->
    <div class="todo-title">
        <div>
            <input type="checkbox" name="" id="complete-checkbox" aria-label="Mark test as complete">
        </div>
        <div class="title">
            <h2 data-testid="test-todo-title">Do your homework</h2>
        </div>
    </div>
    <!-- Header(Task) ends here -->

    <!-- Status starts here -->
    <div role="list" data-testid="test-todo-status" class="status">
        
            <span class="priority-high" data-testid="test-todo-priority">
                High
            </span>
        
            <p class="in-progress-status" data-testid="test-todo-status">In Progress</p>
    </div>
    <!-- Status ends here -->

    <!-- description starts here -->
     <div>
        <p data-testid="test-todo-collapsible-description" id="desc" class="description">Answer the questions on grammatical names and functions in Engl...</p>
        <button data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="desc"class="expandCTA" id="expand-btn">Expand</button>
     </div>
     
     <!-- description ends here -->

     <!-- date and time start here -->
     <div class="time">
        <time data-testid="test-todo-due-date" datetime="2026-2-18T14:00:00">
            Due Feb 18, 2026
        </time>
        <time data-testid="test-todo-time-remaining">
            Due in 3 days
        </time>
     </div>
      <!-- date and time end here -->

      <!-- Tags start here -->
       <ul class="tags" role="list" data-testid="test-todo-tags">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
    <li data-testid="test-todo-tag-perform-task">perform task</li>
  </ul>
  <!-- Tags end here -->


  <!-- Action CTA buttons -->
   <div class="actions">
    <button data-testid="test-todo-edit-button" aria-label="Edit task" class="edit-button" id="edit-btn">Edit</button>
    <button data-testid="test-todo-delete-button" aria-label="Delete task" class="delete-button">Delete</button>
   </div>

   <!-- Edit form/input field starts here -->
    <form class="edit-form" data-testid="test-todo-edit-form" id="edit-form">
        <label class="title-label">Title</label><br>
        <input type="text" data-testid="test-todo-edit-title-input" id="edit-title" placeholder="Enter task"><br>

        <label class="desc-label">Description</label>
        <textarea placeholder="Enter text here" data-testid="test-todo-edit-description-input"></textarea>
        
        <label data-testid="test-todo-edit-priority-select" id="edit-priority">Priority</label><br>
        <select>
            <option class="low">Low</option>
            <option class="medium">Medium</option>
            <option class="high">High</option>
        </select><br>
        <div>
             <label class="due-date">Due date</label><br>
        <input type="datetime" name="" id="edit-date" data-testid="test-todo-edit-due-date" />
        </div>
       

        <button data-testid="test-todo-save-button" class="save">Save</button>
        <button data-testid="test-todo-cancel-button" id="cancel-btn" class="cancel-btn">Cancel</button>
    </form>
    <!-- Edit form/input field ends here -->

   </section> 


   <script src="script.js"></script>
</body>
</html>
